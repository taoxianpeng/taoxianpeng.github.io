baseURL: https://example.org/
locale: en-us
title: Txp's Blog

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['$', '$']]
        enable: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: 图形学
      pageRef: /computer_graphic
      weight: 1
    - name: 计算机基础
      pageRef: /computer_base
      weight: 2
    - name: 其他
      pageRef: /other
      weight: 3
    - name: About
      pageRef: /about
      weight: 4
    - name: Contact ↗
      url: "https://github.com/taoxianpeng"
      weight: 5
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/taoxianpeng"
      params:
        icon: github
    # - name: Twitter
    #   weight: 6
    #   url: "https://twitter.com/"
    #   params:
    #     icon: x-twitter

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/taoxianpeng/taoxianpeng.github.io/edit/main/content"