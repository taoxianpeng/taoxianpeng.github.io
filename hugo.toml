baseURL = 'https://taoxianpeng.github.io/'
title = "Txp's Blog"
theme = "hextra"
enableRobotsTXT = true
enableGitInfo = true
hasCJKLanguage = true

[[menu.main]]
  identifier = "blog"
  name = "博客"
  pageRef = "/blog"
  weight = 1

[[menu.main]]
  identifier = "about"
  name = "关于"
  pageRef = "/about"
  weight = 2

[[menu.main]]
  name = "Search"
  weight = 3
  [menu.main.params]
    type = "search"

[[menu.main]]
  name = "GitHub"
  weight = 4
  url = "https://github.com/taoxianpeng"
  [menu.main.params]
    icon = "github"

[params]
  description = "Txp's Blog - 个人博客"
  displayUpdatedDate = true
  dateFormat = "2006-01-02"
  imageZoom = true

  [params.navbar]
    displayTitle = true
    displayLogo = false
    width = "wide"

  [params.theme]
    default = "system"
    displayToggle = true

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true
    width = "normal"

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"

  [params.blog.list]
    displayTags = true
    sortBy = "date"
    sortOrder = "desc"
    pagerSize = 20

  [params.toc]
    displayTags = true

  [params.highlight.copy]
    enable = true
    display = "hover"
