name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: |
          echo "::notice::pwd=$(pwd)"
          echo "::notice::dirs: content=$(ls content/ 2>/dev/null|wc -l), themes=$(ls themes/ 2>/dev/null|wc -l)"
          echo "::notice::hugo_minimal exists=$(test -f hugo_minimal.toml && echo yes || echo no)"
          
          # Try building from workspace directly with minimal config
          cd /home/runner/work/taoxianpeng.github.io/taoxianpeng.github.io
          cp hugo_minimal.toml hugo.toml
          echo "::notice::Running hugo from $(pwd)"
          set +e
          hugo --verbose 2>&1
          RC=$?
          echo "::notice::Exit code=$RC"

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
