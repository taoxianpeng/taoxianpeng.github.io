name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Check files
        run: |
          echo "::notice::PWD: $(pwd)"
          echo "::notice::Files at root:"
          ls -la | head -20 | while read line; do echo "::notice::$line"; done
          echo "::notice::hugo.toml exists: $(test -f hugo.toml && echo YES || echo NO)"
          echo "::notice::hugo_minimal.toml exists: $(test -f hugo_minimal.toml && echo YES || echo NO)"
          echo "::notice::themes exists: $(test -d themes && echo YES || echo NO)"
          echo "::notice::themes/hextra exists: $(test -d themes/hextra && echo YES || echo NO)"
          echo "::notice::content exists: $(test -d content && echo YES || echo NO)"

      - name: Build
        run: |
          ls -la hugo*.toml
          cat hugo_minimal.toml
          cp hugo_minimal.toml hugo.toml
          echo "::notice::Will use: hugo.toml"
          cat hugo.toml
          echo "::notice::Building..."
          set +e
          LS_OUTPUT=$(ls -la)
          echo "::notice::$LS_OUTPUT"
          hugo --verbose 2>&1 > /tmp/hugo_out.txt
          RC=$?
          echo "::notice::Exit: $RC"
          tail -20 /tmp/hugo_out.txt | while read line; do echo "::notice:::$line"; done
          exit $RC

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
