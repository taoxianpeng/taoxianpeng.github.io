name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Debug
        run: |
          echo "HUGO VERSION:"
          hugo version
          echo "THEMES:"
          ls -la themes/
          echo "THEME EXISTS:"
          test -d themes/hextra && echo "YES" || echo "NO"
          test -f themes/hextra/layouts/baseof.html && echo "BASEOF OK" || echo "BASEOF MISSING"
          echo "FILES:"
          ls content/

      - name: Build
        run: |
          hugo --minify 2>&1 | tee /tmp/hugo_out.txt
          echo "---"
          echo "Exit code: $?"
          echo "Public dir:"
          ls -la public/ 2>/dev/null
          find public/ -name "index.html" 2>/dev/null | head -5

      - name: Show error
        if: failure()
        run: |
          echo "=== BUILD LOG ==="
          cat /tmp/hugo_out.txt 2>/dev/null || echo "(no file)"
          echo "=== HUGO CONFIG ==="
          hugo config 2>&1 | head -30 || true
          exit 1

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
