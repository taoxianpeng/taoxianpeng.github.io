name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build and save log
        run: |
          hugo --minify 2>&1 > /tmp/hugo_output.txt
          RC=$?
          echo "Hugo exit code: $RC"
          echo "=== HUGO VERSION ==="
          hugo version
          echo "=== PUBLIC DIR ==="
          ls -la public/ 2>/dev/null
          find public/ -name "*.html" 2>/dev/null | head -5
          exit $RC

      - name: Upload hugo log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hugo-log
          path: /tmp/hugo_output.txt

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
