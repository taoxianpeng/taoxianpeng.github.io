name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: |
          cp hugo_minimal.toml hugo.toml
          set +e
          hugo --verbose 2>&1 | tee /tmp/hugo_out.txt
          RC=$?
          echo "::notice::Hugo exit code: $RC"
          echo "::group::Last 30 lines"
          tail -30 /tmp/hugo_out.txt
          echo "::endgroup::"
          # Output ALL lines as notices (limited to first 50)
          head -50 /tmp/hugo_out.txt | while read line; do
            echo "::notice::$line"
          done
          exit $RC

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
