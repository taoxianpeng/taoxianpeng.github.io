name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Test hugo
        continue-on-error: true
        run: |
          # Basic tests first
          echo "notice: version=$(hugo version 2>&1)"
          echo "notice: which=$(which hugo 2>&1)"
          echo "notice: help test"
          hugo help 2>&1 | head -3
          echo "notice: site info"
          hugo --config hugo_minimal.toml --verbose config 2>&1
          echo "notice: config exit=$?"

      - name: Build
        run: |
          cp hugo_minimal.toml hugo.toml
          rm -f public/
          hugo 2>&1

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
