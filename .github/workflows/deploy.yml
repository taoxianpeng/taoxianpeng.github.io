name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Test minimal build
        continue-on-error: true
        run: |
          set -x
          cd /tmp
          rm -rf test_site
          mkdir test_site
          cd test_site
          hugo new site . --force 2>&1
          echo "--- Now try with hextra ---"
          cp -r $GITHUB_WORKSPACE/themes/hextra themes/hextra
          echo 'theme = "hextra"' > hugo.toml
          echo 'baseURL = "https://example.com/"' >> hugo.toml
          echo 'title = "Test"' >> hugo.toml
          echo '---' > content/_index.md
          echo 'title: "Home"' >> content/_index.md
          echo '---' >> content/_index.md
          echo 'Hello World' >> content/_index.md
          ls -la themes/
          ls -la themes/hextra/
          hugo --verbose 2>&1
          echo "Exit: $?"
          ls public/ 2>/dev/null

      - name: Build actual site
        continue-on-error: true
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== Current config ==="
          cat hugo.toml
          echo "=== Content ==="
          ls -la content/
          find content/ -type f
          echo "=== Building ==="
          hugo --verbose 2>&1
          echo "EXIT: $?"
          echo "=== Public files ==="
          find public/ -type f 2>/dev/null | head -30
          echo "=== Count ==="
          find public/ -type f 2>/dev/null | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
