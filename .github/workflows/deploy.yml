name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Info
        run: |
          echo "::notice::Hugo version: $(hugo version)"
          echo "::notice::Hugo extended: $(hugo env | grep -i extended)"

      - name: Build
        run: |
          cp hugo_minimal.toml hugo.toml
          set +e
          hugo --verbose 2>&1 > /tmp/hugo_output.txt
          RC=$?
          echo "::notice::Hugo exit code: $RC"
          cat /tmp/hugo_output.txt | tail -30
          # Output errors as notices so they appear in annotations
          grep -i "error\|ERROR\|panic\|fail" /tmp/hugo_output.txt | head -10 | while read line; do
            echo "::error::$line"
          done
          exit $RC

      - name: Show public dir
        if: success()
        run: |
          echo "::notice::Public files: $(find public/ -type f 2>/dev/null | wc -l)"
          find public/ -name "index.html" 2>/dev/null

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
