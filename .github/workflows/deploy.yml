name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "=== files ==="
          ls -la
          ls -la themes/ 2>/dev/null || echo "no themes dir"
          ls -la themes/hextra/ 2>/dev/null || echo "no hextra dir"
          ls -la themes/hextra/layouts/ 2>/dev/null | head -3
          cat hugo.toml | head -3

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.0'
          extended: true

      - name: Build
        run: |
          hugo version
          hugo 2>&1 | tee /tmp/hugo_out.txt
          echo "EXIT: $?"
          ls -la public/ 2>/dev/null || echo "NO PUBLIC DIR"

      - name: Show log
        if: always()
        run: |
          cat /tmp/hugo_out.txt 2>/dev/null || echo "no log file"
          ls -la public/ 2>/dev/null
          find public/ -name "index.html" 2>/dev/null | head -5

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
