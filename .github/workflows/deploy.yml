name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        continue-on-error: true
        run: |
          echo "::notice::PWD: $(pwd)"
          echo "::notice::Content files: $(find content -type f)"
          echo "::notice::Theme layouts count: $(find themes/hextra/layouts -name '*.html' | wc -l)"
          
          hugo --config hugo_minimal.toml --verbose > /tmp/hugo_build.log 2>&1
          RC=$?
          echo "::notice::Exit code: $RC"
          
          # Output all Hugo output as annotations (using awk to prefix)
          awk '{print "::notice::" $0}' /tmp/hugo_build.log | head -50
          
          echo "::notice::LOG SIZE: $(wc -c < /tmp/hugo_build.log) bytes"
          echo "::notice::Public files: $(find public -type f 2>/dev/null | wc -l)"
          echo "::notice::Public index: $(find public -name 'index.html' 2>/dev/null)"

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
