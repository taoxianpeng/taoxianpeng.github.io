name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Tests
        continue-on-error: true
        run: |
          set +e
          echo "::notice::1. version: $(hugo version)"
          echo "::notice::2. pwd: $(pwd)"
          ls -la
          echo "::notice::3. hugo help"
          hugo help > /tmp/help_out.txt 2>&1
          echo "::notice::4. help exit=$?"
          echo "::notice::5. hugo config"
          hugo --config hugo_minimal.toml config > /tmp/config_out.txt 2>&1
          echo "::notice::6. config exit=$?"
          echo "::notice::7. hugo build test"
          cd /tmp && rm -rf test_hugo && mkdir test_hugo && cd test_hugo
          echo 'baseURL = "https://ex.com/"' > hugo.toml
          echo 'title = "T"' >> hugo.toml
          mkdir -p content
          echo '---' > content/_index.md
          echo 'title: "X"' >> content/_index.md
          echo '---' >> content/_index.md
          echo '# Hello' >> content/_index.md
          hugo > /tmp/hugo_build_test.txt 2>&1
          echo "::notice::8. simple build exit=$?"

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
